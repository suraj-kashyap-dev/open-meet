name: openmeet

services:
  postgres:
    image: postgres:16-alpine
    container_name: openmeet-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: openmeet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d openmeet']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: openmeet-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  livekit:
    image: livekit/livekit-server:latest
    container_name: openmeet-livekit
    restart: unless-stopped
    ports:
      - '7880:7880'
      - '7881:7881'
      - '7882:7882/udp'
    volumes:
      - ./docker/livekit.yaml:/etc/livekit.yaml:ro
    command: ['--config', '/etc/livekit.yaml', '--dev', '--bind', '0.0.0.0']
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:7880/']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

  livekit-egress:
    image: livekit/egress:latest
    container_name: openmeet-egress
    restart: unless-stopped
    # Egress writes recordings to /out inside the container. The mount target
    # MUST match the API's LOCAL_STORAGE_DIR (default `./uploads` resolved
    # from the apps/server working directory). Otherwise the API will look
    # for the MP4 in apps/server/uploads/ while egress writes to ./uploads/.
    volumes:
      - ./apps/server/uploads:/out
      - ./docker/egress.yaml:/etc/egress.yaml:ro
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_healthy
    # The egress service launches headless Chromium; SYS_ADMIN is required by
    # default. Drop or replace with SECCOMP profile in production.
    cap_add:
      - SYS_ADMIN

  coturn:
    image: coturn/coturn:latest
    container_name: openmeet-coturn
    restart: unless-stopped
    # NOTE: spec calls for network_mode: host, which is Linux-only.
    # Using explicit port mappings so this also works on Windows/macOS Docker Desktop.
    ports:
      - '3478:3478/tcp'
      - '3478:3478/udp'
      - '5349:5349/tcp'
      - '5349:5349/udp'
      - '49160-49200:49160-49200/udp'
    volumes:
      - ./docker/coturn.conf:/etc/coturn/turnserver.conf:ro
    command: ['-c', '/etc/coturn/turnserver.conf']

  mailhog:
    image: mailhog/mailhog:latest
    container_name: openmeet-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  postgres_data:
  redis_data:
