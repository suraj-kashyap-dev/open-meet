name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0
  CI: true

jobs:
  lint:
    name: ESLint & Prettier
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.16.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate (typed client for ESLint resolution)
        run: pnpm --filter @open-meet/server prisma:generate

      - name: ESLint (all workspaces)
        run: pnpm lint

      - name: Prettier check
        run: pnpm format:check
