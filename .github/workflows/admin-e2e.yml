name: Admin E2E

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: admin-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0
  CI: true

jobs:
  admin-e2e:
    name: Admin E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.16.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm exec turbo run build --filter='./packages/*'

      - name: Install Playwright browsers
        run: pnpm --filter @open-meet/admin exec playwright install --with-deps chromium

      - name: Admin E2E tests
        run: pnpm --filter @open-meet/admin test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: admin-playwright-report
          path: apps/admin/playwright-report
          retention-days: 7
