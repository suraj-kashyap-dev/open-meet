name: Feature request
description: Suggest an improvement to Open Meet
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.

        Good feature requests explain the problem first, then the proposed change. If the request touches security-sensitive behavior such as auth, roles, room access, uploads, or secrets handling, call that out explicitly.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web app
        - Admin app
        - Server/API
        - Realtime or meetings
        - Authentication
        - Docker or deployment
        - Internationalization
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user or developer problem are you trying to solve?
      placeholder: It is difficult to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention any workarounds or alternate approaches you evaluated.
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Who benefits from this change and how?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add references, screenshots, or related issues if helpful.
