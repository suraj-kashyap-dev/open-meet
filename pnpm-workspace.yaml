packages:
  - 'apps/*'
  - 'packages/*'

linkWorkspacePackages: true
preferWorkspacePackages: true
autoInstallPeers: true
strictPeerDependencies: false

onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/client'
  - '@prisma/engines'
  - '@scarf/scarf'
  - 'argon2'
  - 'esbuild'
  - 'msgpackr-extract'
  - 'prisma'
  - 'sharp'
  - '@swc/core'
