# LiveKit dev configuration
# Docs: https://docs.livekit.io/home/self-hosting/deployment/

port: 7880

rtc:
  tcp_port: 7881
  udp_port: 7882
  use_external_ip: false
  # Restrict the WebRTC port range so it lines up with the docker-compose port mappings.
  port_range_start: 50000
  port_range_end: 50100

# Single key pair for dev — must match LIVEKIT_API_KEY / LIVEKIT_API_SECRET in apps/api/.env
keys:
  devkey: secret

redis:
  address: redis:6379

# Optional: ICE servers (coturn). LiveKit will inject these into client offers.
turn:
  enabled: false
  # When promoting to staging/prod, point at coturn:
  # domain: turn.example.com
  # tls_port: 5349
  # udp_port: 3478

log_level: info
